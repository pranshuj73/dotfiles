;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/bspwm]
type = internal/bspwm
pin-workspaces = true
enable-scroll = false

format = <label-state>

; Active workspace — slightly wider glyph
label-focused = 
label-focused-foreground = #e0e0e0
label-focused-padding = 1

; Occupied workspace — mid gray
label-occupied = 
label-occupied-foreground = #9a9a9a
label-occupied-padding = 1

; Empty workspace — dim gray
label-empty = 
label-empty-foreground = #4a4a4a
label-empty-padding = 1

; Urgent — light gray (still grayscale)
label-urgent = 
label-urgent-foreground = #c8c8c8
label-urgent-padding = 1

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/date]
type = internal/date
interval = 5

date = %Y-%m-%d
time = %H:%M

label = %date%  %time%

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/alsa]
type = internal/alsa

interval = 2

format-volume = <ramp-volume> <label-volume>
format-muted  = <label-muted>

label-volume = %percentage%%
label-volume-foreground = #d0d0d0

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = #d0d0d0
ramp-volume-padding = 1

label-muted =  0%
label-muted-foreground = #5a5a5a
