[module/bspwm]
type = internal/bspwm
pin-workspaces = true
enable-scroll = false

format = <label-state>
format-background = #67000000
format-padding = 0

; Active workspace ‚ÄĒ slightly wider glyph
label-focused = ÔÜí
label-focused-foreground = #e0e0e0
label-focused-padding = 1

; Occupied workspace ‚ÄĒ mid gray
label-occupied = ÔĎĄ
label-occupied-foreground = #9a9a9a
label-occupied-padding = 1

; Empty workspace ‚ÄĒ dim gray
label-empty = ÔďÉ
label-empty-foreground = #4a4a4a
label-empty-padding = 1

; Urgent ‚ÄĒ light gray (still grayscale)
label-urgent = ÔĎĄ
label-urgent-foreground = #c8c8c8
label-urgent-padding = 1

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/date]
type = internal/date
interval = 5

time = %H:%M

date = %Y-%m-%d
label = %date% ‚ÄĒ %time%
format-background = #67000000
format-padding = 6

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/alsa]
type = internal/alsa

interval = 1
master-mixer = Master
use-ui-max = true

format-volume = <ramp-volume> <label-volume>
format-muted  = <label-muted>
format-volume-background = #67000000
format-muted-background = #67000000
format-volume-padding = 1
format-muted-padding = 1

label-volume = %percentage%%
label-volume-foreground = #d0d0d0

ramp-volume-0 = ÔÄ¶
ramp-volume-1 = ÔÄß
ramp-volume-2 = ÔÄ®
ramp-volume-foreground = #d0d0d0
ramp-volume-padding = 1

label-muted = ÔÄ¶ 0%
label-muted-foreground = #5a5a5a

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/network]
type = internal/network
interface = wlp2s0
interval = 3

format-connected = <ramp-signal> <label-connected>
format-disconnected = <label-disconnected>
format-connected-background = #67000000
format-disconnected-background = #67000000
format-connected-padding = 1
format-disconnected-padding = 1

label-connected = %essid%
label-connected-foreground = #d0d0d0

label-disconnected = ůį§≠
label-disconnected-foreground = #5a5a5a

ramp-signal-0 = ůį§Į
ramp-signal-1 = ůį§ü
ramp-signal-2 = ůį§Ę
ramp-signal-3 = ůį§•
ramp-signal-4 = ůį§®
ramp-signal-foreground = #d0d0d0
ramp-signal-padding = 1

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <label-full>
format-charging-background = #67000000
format-discharging-background = #67000000
format-full-background = #67000000
format-charging-padding = 1
format-discharging-padding = 1
format-full-padding = 1

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = ÔČÄ 100%

label-charging-foreground = #d0d0d0
label-discharging-foreground = #d0d0d0
label-full-foreground = #d0d0d0

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ
ramp-capacity-foreground = #d0d0d0
ramp-capacity-padding = 1

animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-framerate = 750
animation-charging-foreground = #d0d0d0

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/weather]
type = custom/script
exec = ~/.config/polybar/scripts/weather.sh
interval = 600
format-background = #67000000
format-padding = 0
format = <label>
label = %output%

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/system_pill]
type = custom/script
exec = ~/.config/polybar/scripts/system_pill.sh
interval = 2
format-background = #67000000
format-padding = 0

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/status_pill]
type = custom/script
exec = ~/.config/polybar/scripts/status_pill.sh
tail = true
format-background = #67000000
format-padding = 0
format = <label>
label = %output%
click-left = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/tray]
type = internal/tray
format = <tray>
format-background = #67000000
format-padding = 0
tray-spacing = 6px
tray-padding = 6px
tray-size = 66%

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/gap]
type = custom/text
content = "  "
content-background = #00000000

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/cap-left]
type = custom/text
format = <label>
label = Óā∂
label-foreground = #67000000
label-background = #00000000
label-font = 2
label-padding = 0

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/cap-right]
type = custom/text
format = <label>
label = Óāī
label-foreground = #67000000
label-background = #00000000
label-font = 2
label-padding = 0

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/ind-weather]
type = custom/script
exec = ~/.config/polybar/scripts/indicator_weather.sh
interval = 5

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/ind-system]
type = custom/script
exec = ~/.config/polybar/scripts/indicator_system.sh
interval = 5

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/ind-status]
type = custom/script
exec = ~/.config/polybar/scripts/indicator_status.sh
interval = 1
