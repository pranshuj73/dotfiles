[global/wm]
margin-top    = 2
margin-bottom = 0
include-file  = ~/.config/polybar/colors.ini
include-file  = ~/.config/polybar/modules.ini


[bar/main]
width  = 99%
height = 24
offset-x = 0.5%
offset-y = 6
radius = 8.0
bottom = false
fixed-center = true

background = #00000000
foreground = #d0d0d0

line-size  = 0

; thin subtle border in dark gray
border-size  = 0
border-color = #2a2a2a

padding-left  = 0
padding-right = 0

module-margin-left  = 0
module-margin-right = 0

font-0 = FiraCode Nerd Font:style=Medium:size=8;2
font-1 = FiraCode Nerd Font:style=Medium:size=24;2

modules-left   = cap-left bspwm cap-right
modules-center = cap-left date cap-right
modules-right  = cap-left ind-weather weather cap-right gap cap-left ind-system system_pill cap-right gap cap-left ind-status status_pill cap-right

wm-restack = bspwm
enable-ipc = true

[settings]
screenchange-reload = true
